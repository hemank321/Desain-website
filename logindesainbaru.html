<!DOCTYPE html>
<html>
<head>
    <title>Login Designer</title>
    <link rel="stylesheet" href="cssdesainbaru.css">
</head>
<body class="login-body">

<div class="login-box">
    <h2>Welcome Designer 🎨</h2>
    <input type="text" id="username" placeholder="Username">
    <input type="password" id="password" placeholder="Password">
    <button onclick="login()">Login</button>
</div>

<script src="jvdesainbaru.js"></script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <link rel="stylesheet" href="cssdesainbaru.css">
</head>

<body>

<div class="container">

    <!-- SIDEBAR -->
    <div class="sidebar">
        <h2>Menu</h2>
        <ul>
            <li onclick="showSection('about')">Tentang Saya</li>
            <li onclick="showSection('portfolio')">Portofolio</li>
            <li onclick="showSection('chat')">Chat</li>
            <li onclick="logout()">Logout</li>
        </ul>
    </div>

    <!-- CONTENT -->
    <div class="content">

        <!-- TENTANG -->
        <div id="about" class="section">
            <h2>Tentang Saya</h2>
            <table border="1">
                <tr><td>Nama</td><td>Isi sendiri</td></tr>
                <tr><td>Kampus</td><td>Isi sendiri</td></tr>
                <tr><td>Jurusan</td><td>Isi sendiri</td></tr>
            </table>
        </div>

        <!-- PORTFOLIO -->
        <div id="portfolio" class="section" style="display:none;">
            <h2>Portofolio</h2>


            <input type="file" id="upload" multiple>
            <button onclick="uploadImage()">Upload</button>

            <div id="gallery"></div>
        </div>

        <!-- CHAT -->
        <div id="chat" class="section" style="display:none;">
            <h2>Chat AI</h2>

            <div id="chatBox"></div>

            <input type="text" id="chatInput" placeholder="Tulis pesan...">
            <button onclick="sendMessage()">Kirim</button>
        </div>
        
        

    </div>
    <div class="header">
    <h2 id="welcome"></h2>
    <button onclick="toggleDarkMode()">🌙 Mode</button>
</div>

</div>

<script src="jvdesainbaru.js"></script>
</body>
</html>
